spring:
  datasource:
    url: jdbc:mariadb://localhost:3306/callmate?useSSL=false&serverTimezone=Asia/Seoul
    username: callmate_user
    password: callmate_pass
    driver-class-name: org.mariadb.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    open-in-view: false

logging:
  level:
    root: info
    org.springframework.web: debug

server:
  port: 8090
